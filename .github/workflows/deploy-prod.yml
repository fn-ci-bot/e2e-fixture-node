# 🚀 Deploy to Production
# Auto-generated by FluxNow onboarding service
# Promotes the staging image to production (no rebuild)
# Uses fluxnow/action@v1 mode: promote
name: 🚀 Deploy to Production
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type "deploy" to confirm production deployment
        required: true
        type: string
jobs:
  promote:
    if: github.event.inputs.confirm == 'deploy'
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: fluxnow/action@v1
        with:
          fluxnow-token: ${{ secrets.FLUXNOW_TOKEN }}
          mode: promote
          target-env: prod
  rejected:
    if: github.event.inputs.confirm != 'deploy'
    runs-on: ubuntu-latest
    steps:
      - name: Deployment rejected
        run: |-
          echo "❌ You must type 'deploy' to confirm."
          exit 1
